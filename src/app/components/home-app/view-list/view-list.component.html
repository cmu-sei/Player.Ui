<div class="view-list-container mat-elevation-z8">
  <div class="icon-text-container">
    <mat-icon class="player-icon" svgIcon="ic_crucible_player"></mat-icon>
    <span class="views-title text">My Views</span>
    @if (canCreate$ | async) {
      <button mat-icon-button matTooltip="Add New View" (click)="create()">
        <mat-icon class="mdi-24px" fontIcon="mdi-plus-circle"> </mat-icon>
      </button>
    }
    <div class="searchBox">
      <mat-form-field style="width: 320px">
        <input
          matInput
          [(ngModel)]="filterString"
          (keyup)="applyFilter($event.target.value)"
          placeholder="Search"
        />
        @if (filterString !== '') {
          <button
            mat-icon-button
            matSuffix
            (click)="clearFilter()"
            title="Clear Search"
          >
            <mat-icon
              style="transform: scale(0.85)"
              fontIcon="mdi-close-circle-outline"
            ></mat-icon>
          </button>
        }
      </mat-form-field>
    </div>
  </div>

  <mat-table
    #table
    [dataSource]="dataSource"
    matSort
    matSortActive="name"
    matSortDirection="asc"
  >
    <!--- Note that these columns can be defined in any order.
    The actual rendered columns are set as a property on the row definition" -->
    <!-- Name Column -->
    <ng-container matColumnDef="name">
      <mat-header-cell *matHeaderCellDef mat-sort-header>
        Name
      </mat-header-cell>
      <mat-cell *matCellDef="let element">
        <a
          [routerLink]="['/view', element.id]"
          >{{ element.name }}</a
        >
      </mat-cell>
    </ng-container>

    <!-- Description Column -->
    <ng-container matColumnDef="description">
      <mat-header-cell *matHeaderCellDef> Description </mat-header-cell>
      <mat-cell *matCellDef="let element">
        {{ element.description }}
      </mat-cell>
    </ng-container>

    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
    <mat-row *matRowDef="let row; columns: displayedColumns"></mat-row>
  </mat-table>
  @if (dataSource.filteredData.length === 0) {
    <div class="text no-results">No results found</div>
  }

  @if (isLoading) {
    <mat-card appearance="outlined" class="d-flex justify-content-center align-items-center">
      <mat-progress-spinner color="primary" mode="indeterminate">
      </mat-progress-spinner>
    </mat-card>
  }
</div>
