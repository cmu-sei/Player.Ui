<mat-list class="list-container">
    @for (app of applications$ | async; track trackByFn($index, app)) {
      @if (app.loadInBackground) {
        <iframe
          aria-hidden="true"
          class="hidden-app-iframe"
          [src]="app.safeUrl"
        ></iframe>
      }
      @if (mini) {
        <mat-list-item class="non-selected-item">
          <a
            [title]="app.name"
            [href]="app.themedUrl"
            (click)="openApplication(app, $event)"
            class="app-link-mini"
          >
            <img class="mat-list-item-icon" src="{{ app.icon }}" alt="{{ app.name }}" />
          </a>
        </mat-list-item>
      } @else {
        <mat-list-item class="list-item">
          <div class="app-button-container">
            <a
              mat-button
              [title]="app.name"
              class="px-0 w-100 normal-text justify-content-start"
              [href]="app.themedUrl"
              (click)="openApplication(app, $event)"
            >
              <div class="d-flex align-items-center">
                <img class="lefticon" src="{{ app.icon }}" alt="{{ app.name }}" />
                <div class="app-name px-2">
                  {{ app.name }}
                </div>
              </div>
            </a>
          </div>
        </mat-list-item>
      }
    }
</mat-list>
