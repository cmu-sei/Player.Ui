<div class="scrollable-div">
  <mat-list class="appitems-container">
    @for (app of applications$ | async; track trackByFn($index, app)) {
      <mat-list-item [ngClass]="mini ? 'list-item-mini' : 'list-item'">
        @if (app.loadInBackground) {
          <iframe
            aria-hidden="true"
            class="hidden-app-iframe"
            [src]="app.safeUrl"
          ></iframe>
        }
        <div class="app-button-container">
          <a
            mat-button
            [title]="app.name"
            [ngClass]="
              mini
                ? 'px-0 w-100 normal-text justify-content-center'
                : 'px-0 w-100 normal-text justify-content-start'
            "
            [href]="app.themedUrl"
            (click)="openApplication(app, $event)"
          >
            <div
              class="d-flex align-items-center"
              [ngClass]="mini ? 'justify-content-center' : null"
            >
              <img class="lefticon" src="{{ app.icon }}" alt="{{ app.name }}" />
              @if (!mini) {
                <div class="app-name px-2">
                  {{ app.name }}
                </div>
              }
            </div>
          </a>
        </div>
      </mat-list-item>
    }
  </mat-list>
</div>
