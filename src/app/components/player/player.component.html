@if (data$ | async; as data) {
  <mat-sidenav-container
    class="appcontent-container"
    [autosize]="autosizeSidenav"
    >
    <mat-sidenav
      #sidenav
      [ngClass]="
        (mini$ | async) ? 'appbarmenu-container-mini' : 'appbarmenu-container'
      "
      mode="side"
      [opened]="opened$ | async"
      mwlResizable
      (resizing)="resizingFn($event)"
      (resizeEnd)="resizeEnd($event)"
      [ngStyle]="resizeStyle"
      >
      <div class="grid">
        <div class="sidebar-content">
          @if (!(mini$ | async)) {
            <mat-toolbar class="sidenav-header" title="Return to Home" [routerLink]="['/']">
              <a class="nolink" [routerLink]="['/']">
                <div class="d-flex align-items-center">
                  <mat-icon class="icon-35px player-icon-header" svgIcon="ic_crucible_player"></mat-icon>
                  <h2 class="icon-text">{{ data.title }}</h2>
                </div>
              </a>
            </mat-toolbar>
          } @else {
            <mat-list>
              <mat-list-item class="player-title-mini">
                <a [routerLink]="['/']" title="Return to Home" class="home-link-mini">
                  <mat-icon class="mat-list-item-icon mdi-24px" svgIcon="ic_crucible_player"></mat-icon>
                </a>
              </mat-list-item>
            </mat-list>
          }
          <mat-divider></mat-divider>
          <app-application-list
            [viewId]="data.view.id"
            [teams]="data.teams"
            [mini]="mini$ | async"
          ></app-application-list>
          @if (!(mini$ | async)) {
            <div class="bottom-div">
              <div class="admin-and-collapse">
                <div class="admin-section">
                </div>
                <div class="collapse-section">
                  <button mat-icon-button title="Collapse to Icons Only" (click)="toggleMini()">
                    <mat-icon aria-hidden="false" class="mdi-24px" fontIcon="mdi-chevron-double-left"></mat-icon>
                  </button>
                </div>
              </div>
              <img
                alt="crucible logo"
                class="crucible-logo"
                [src]="
                  (theme$ | async) === 'light-theme'
                    ? 'assets/img/crucible-logo-light.png'
                    : 'assets/img/crucible-logo-dark.png'
                "
              />
            </div>
          } @else {
            <div class="bottom-div">
              <button mat-icon-button title="Expand Navigation Panel" (click)="toggleMini()">
                <mat-icon aria-hidden="false" class="mdi-24px" fontIcon="mdi-chevron-double-right"></mat-icon>
              </button>
              <img
                alt="crucible logo"
                class="crucible-logo-mini"
                [src]="
                  (theme$ | async) === 'light-theme'
                    ? 'assets/img/crucible-app-color-white.png'
                    : 'assets/img/crucible-app-color.png'
                "
              />
            </div>
          }
        </div>
        @if (!(mini$ | async)) {
          <div
            class="resize-handle-right"
            mwlResizeHandle
            [resizeEdges]="{ right: true }"
          ></div>
        }
      </div>
    </mat-sidenav>
    <mat-sidenav-content class="noscroll">
      <app-topbar
        [sidenav]="sidenav"
        [title]="data.view.name"
        topbarView="player-player"
        [teams]="data.teams"
        [team]="data.team"
        [viewId]="viewId"
        [mini]="mini$ | async"
        (setTeam)="setPrimaryTeam($event)"
        (sidenavToggle)="sidenavToggleFn($event)"
        (editView)="editViewFn($event)"
      ></app-topbar>
      <app-focused-app></app-focused-app>
      @if (user$ | async; as user) {
        <app-notifications
          [viewGuid]="data.view.id"
          [teamGuid]="data.team.id"
          [userGuid]="user.profile.id"
          [userToken]="user.access_token"
          [userName]="user.profile.name"
          class="notification-height"
          >
        </app-notifications>
      } @else {
        LOADING
      }
    </mat-sidenav-content>
  </mat-sidenav-container>
} @else {
  LOADING
}
