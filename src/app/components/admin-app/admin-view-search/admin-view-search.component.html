<app-admin-view-edit
  [class.hidden]="!showEditScreen"
  (editComplete)="onEditComplete($event)"
></app-admin-view-edit>

<div
  [class.hidden]="showEditScreen"
  class="view-list-container mat-elevation-z8"
>
  <div class="d-flex align-items-center gap-1">
    <mat-icon class="player-icon-small" svgIcon="ic_crucible_player"></mat-icon>
    <h3 class="header-text ms-2">Views</h3>
    <div class="ms-5">
      <mat-form-field style="width: 320px" subscriptSizing="dynamic">
        <mat-icon
          matPrefix
          style="transform: scale(0.85); margin-right: 5px"
          svgIcon="ic_magnify_search"
        ></mat-icon>
        <input
          matInput
          [(ngModel)]="filterString"
          (keyup)="applyFilter($event.target.value)"
          placeholder="Search"
        />
        @if (filterString !== '') {
          <button
            mat-icon-button
            matSuffix
            (click)="clearFilter()"
            title="Clear Search"
          >
            <mat-icon
              style="transform: scale(0.85)"
              svgIcon="ic_cancel_circle"
            ></mat-icon>
          </button>
        }
      </mat-form-field>
    </div>
    <div class="ms-auto">
      <button
        mat-icon-button
        matTooltip="Add a new View"
        (click)="addNewView()"
      >
        <mat-icon fontIcon="mdi-plus" class="mdi-24px"></mat-icon>
      </button>
      <button
        mat-icon-button
        matTooltip="Import Views"
        (click)="openDialog(importDialog)"
      >
        <mat-icon fontIcon="mdi-file-import" class="mdi-24px"></mat-icon>
      </button>
      <button
        mat-icon-button
        matTooltip="Export Views"
        [matBadge]="
          selection.selected.length > 0 ? selection.selected.length : ''
        "
        (click)="openDialog(exportDialog)"
      >
        <mat-icon fontIcon="mdi-file-export" class="mdi-24px"></mat-icon>
      </button>
    </div>
  </div>

  @if (isLoading) {
    <mat-card class="d-flex justify-content-center align-items-center">
      <mat-progress-spinner color="primary" mode="indeterminate">
      </mat-progress-spinner>
    </mat-card>
  }

  <mat-table #table [dataSource]="viewDataSource" matSort>
    <ng-container matColumnDef="select">
      <mat-header-cell *matHeaderCellDef>
        <mat-checkbox
          (change)="$event ? toggleAllRows() : null"
          [checked]="selection.hasValue() && isAllSelected()"
          [indeterminate]="selection.hasValue() && !isAllSelected()"
        >
        </mat-checkbox>
      </mat-header-cell>
      <mat-cell *matCellDef="let row">
        <mat-checkbox
          (click)="$event.stopPropagation()"
          (change)="$event ? selection.toggle(row.id) : null"
          [checked]="selection.isSelected(row.id)"
        >
        </mat-checkbox>
      </mat-cell>
    </ng-container>

    <!-- Name Column -->
    <ng-container matColumnDef="name">
      <mat-header-cell *matHeaderCellDef mat-sort-header>
        View Name
      </mat-header-cell>
      <mat-cell *matCellDef="let element">
        <button
          mat-icon-button
          ngxClipboard
          [cbContent]="element.id"
          title="Copy:  {{ element.id }}"
        >
          <mat-icon
            style="transform: scale(0.85)"
            svgIcon="ic_clipboard_copy"
          ></mat-icon>
        </button>
        <button
          mat-button
          class="px-0"
          (click)="executeViewAction('edit', element.id)"
        >
          {{ element.name }}
        </button>
      </mat-cell>
    </ng-container>

    <!-- Description Column -->
    <ng-container matColumnDef="description">
      <mat-header-cell *matHeaderCellDef> Description </mat-header-cell>
      <mat-cell *matCellDef="let element">
        <div class="description-text" style="margin: 5px">
          {{ element.description }}
        </div>
      </mat-cell>
    </ng-container>

    <!-- Status Column -->
    <ng-container matColumnDef="status">
      <mat-header-cell *matHeaderCellDef mat-sort-header>
        Status
      </mat-header-cell>
      <mat-cell *matCellDef="let element">
        <div class="team-text">{{ element.status }}</div>
      </mat-cell>
    </ng-container>

    <mat-header-row
      *matHeaderRowDef="displayedColumns; sticky: true"
    ></mat-header-row>
    <mat-row *matRowDef="let row; columns: displayedColumns"></mat-row>
  </mat-table>
  @if (viewDataSource.filteredData.length === 0) {
    <div>No results found</div>
  }
</div>

<ng-template #exportDialog>
  <app-admin-app-view-export
    [ids]="selection.selected"
    (complete)="closeDialog()"
  ></app-admin-app-view-export>
</ng-template>

<ng-template #importDialog>
  <app-admin-app-view-import
    (complete)="importComplete()"
  ></app-admin-app-view-import>
</ng-template>
