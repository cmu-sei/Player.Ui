<div class="mat-elevation-z8 subscriptions-container">
  <div class="d-flex align-items-center">
    <img
      src="assets/img/subscription.png"
      alt="Subscriptions"
      width="35"
      class="ms-2"
    />
    <!-- <mat-icon class="player-icon-small" svgIcon="ic_crucible_player"></mat-icon> -->
    <h3 class="header-text ms-2">Subscriptions</h3>
    <div class="d-flex align-items-center ms-4">
      <mat-form-field style="width: 320px" subscriptSizing="dynamic">
        <input
          matInput
          [(ngModel)]="filterStr"
          (keyup)="applyFilter($event.target.value)"
          placeholder="Search"
        />
        @if (filterStr !== '') {
          <button
            mat-icon-button
            matSuffix
            color="primary"
            (click)="clearFilter()"
            title="Clear Search"
          >
            <mat-icon
              style="transform: scale(0.85)"
              svgIcon="ic_cancel_circle"
            ></mat-icon>
          </button>
        }
      </mat-form-field>
    </div>
    <div class="ms-auto">
      <button
        mat-icon-button
        matTooltip="Add a new Subscription"
        (click)="addNewSubscription()"
      >
        <mat-icon fontIcon="mdi-plus-circle" class="mdi-24px"></mat-icon>
      </button>
    </div>
  </div>

  <mat-table #table [dataSource]="dataSource" matSort>
    <!-- Actions column -->
    <ng-container matColumnDef="actions">
      <mat-header-cell *matHeaderCellDef></mat-header-cell>
      <mat-cell *matCellDef="let element">
        <button
          mat-icon-button
          title="Edit Subscription"
          (click)="editSubscription(element)"
        >
          <mat-icon style="transform: scale(0.85)" svgIcon="ic_edit"></mat-icon>
        </button>
        <button
          mat-icon-button
          title="Delete Subscription"
          (click)="deleteSubscription(element)"
        >
          <mat-icon style="transform: scale(0.85)" svgIcon="ic_delete"></mat-icon>
        </button>
      </mat-cell>
    </ng-container>

    <!-- Name column -->
    <ng-container matColumnDef="name">
      <mat-header-cell *matHeaderCellDef mat-sort-header>
        Name
      </mat-header-cell>
      <mat-cell *matCellDef="let element">
        {{ element.name }}
      </mat-cell>
    </ng-container>

    <!-- Error Column -->
    <ng-container matColumnDef="lastError">
      <mat-header-cell *matHeaderCellDef> Last Error </mat-header-cell>
      <mat-cell *matCellDef="let element">
        {{ element.lastError }}
      </mat-cell>
    </ng-container>

    <!-- EventTypes Column -->
    <ng-container matColumnDef="eventTypes">
      <mat-header-cell *matHeaderCellDef mat-sort-header>
        Event Types
      </mat-header-cell>
      <mat-cell *matCellDef="let element">
        {{ element.eventTypes }}
      </mat-cell>
    </ng-container>

    <mat-header-row
      *matHeaderRowDef="displayedColumns; sticky: true"
    ></mat-header-row>
    <mat-row *matRowDef="let row; columns: displayedColumns"></mat-row>
  </mat-table>
</div>
