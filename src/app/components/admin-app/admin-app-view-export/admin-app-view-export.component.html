<h2>Export Views</h2>

@if (!(hasErrors$ | async)) {
  <form [formGroup]="form" (ngSubmit)="export()">
    <mat-form-field>
      <mat-label>Archive Type</mat-label>
      <mat-select formControlName="archiveType">
        @for (archiveType of archiveTypes; track archiveType) {
          <mat-option
            [value]="archiveType"
            >
            {{ archiveType }}
          </mat-option>
        }
      </mat-select>
    </mat-form-field>
    <div class="d-flex justify-content-around">
      <button
        type="submit"
        color="primary"
        mat-raised-button
        [disabled]="!form.valid || loading"
        >
        {{
        loading
        ? 'Exporting....'
        : 'Export ' + (ids.length == 0 ? 'All' : '(' + ids.length + ')')
        }}
      </button>
      <button type="reset" color="primary" mat-raised-button (click)="cancel()">
        Cancel
      </button>
    </div>
  </form>
}

@if (hasErrors$ | async) {
  <div>
    <h3 class="text-danger">
      Some errors occurred during export. Check errors.txt in the archive for
      details.
    </h3>
    <div class="d-flex justify-content-around">
      <button mat-raised-button color="primary" (click)="cancel()">OK</button>
    </div>
  </div>
}
